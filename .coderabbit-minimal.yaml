language: "en-US"

reviews:
  profile: "chill"          
  request_changes_workflow: true   # Automatically approve once CodeRabbit’s comments are resolved and no pre-merge checks are failing
  high_level_summary: true
  auto_review:
    enabled: true
    drafts: false

  path_instructions:
    - path: "**/*"
      instructions: >
        Prioritize security issues: injection vulnerabilities, auth/authz gaps,
        hardcoded secrets, unsafe deserialization, SSRF, and insecure dependency usage.
        Flag these even if minor style issues are otherwise ignored.

  tools:
    semgrep:
      enabled: true          # broad SAST for security bugs
    gitleaks:                # or betterleaks, its newer replacement
      enabled: true          # secret scanning
    osv-scanner:
      enabled: true          # vulnerable dependency detection
    checkov:
      enabled: true          # IaC misconfiguration scanning (if you have Terraform/CFN/etc.)

chat:
  auto_reply: true